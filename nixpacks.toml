# Railway / Nixpacks build config for Mandata.
#
# Single service:
#   - install root deps (postinstall recursively installs server/)
#   - scrape the corpus (cached — fast on rebuilds)
#   - build the Vite frontend into ./dist
#   - start the Express backend, which serves /api and falls back to dist/index.html

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "node scripts/scrape.mjs",
  "npm run build",
]

[start]
cmd = "node server/index.mjs"

[variables]
NODE_ENV = "production"
